name: Scrape cultural events

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: echo "DATABASE_URL length is ${#DATABASE_URL}, TURSO_AUTH_TOKEN length is ${#TURSO_AUTH_TOKEN}"
      - run: npm ci
      - run: npm run scrape
